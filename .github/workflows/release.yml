name: Release
on:
  push:
    tags:
      - "*.*.*"
permissions:
  id-token: write
  contents: read
  checks: write
jobs:
  build:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Build and Test
        run: ./Build.ps1
        shell: pwsh
      - name: Report Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (Linux)
          path: artifacts/**/*.trx
          reporter: dotnet-trx
  build-windows:
    needs: build
    strategy:
      fail-fast: false
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Install NuGetKeyVaultSignTool
        run: dotnet tool install --global NuGetKeyVaultSignTool
      - name: Build and Test
        run: ./Build.ps1
        shell: pwsh
      - name: Report Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (Windows)
          path: artifacts/**/*.trx
          reporter: dotnet-trx
      - name: Generate SBOM
        run: |
          dotnet tool install --global Microsoft.Sbom.DotNetTool --version 4.1.5
          sbom-tool generate -b artifacts -bc src/AutoMapper -pn AutoMapper -pv ${{ github.ref_name }} -ps LuckyPennySoftware -nsb https://automapper.io/sbom
        shell: pwsh
      - name: Sign packages
        run: |-
          foreach ($f in Get-ChildItem "./artifacts" -Filter "*.nupkg") {
            NuGetKeyVaultSignTool sign $f.FullName --file-digest sha256 --timestamp-rfc3161 http://timestamp.digicert.com --azure-key-vault-managed-identity --azure-key-vault-url ${{ secrets.AZURE_KEYVAULT_URI }} --azure-key-vault-certificate ${{ secrets.CODESIGN_CERT_NAME }}
          }
      - name: Push to MyGet
        env:
          NUGET_URL: https://f.feedz.io/lucky-penny-software/automapper/nuget/index.json
          NUGET_API_KEY: ${{ secrets.FEEDZIO_ACCESS_TOKEN }}
        run: ./Push.ps1
        shell: pwsh
      - name: Push to NuGet
        env:
          NUGET_URL: https://api.nuget.org/v3/index.json
          NUGET_API_KEY: ${{ secrets.AUTOMAPPER_NUGET_API_KEY }}
        run: ./Push.ps1
        shell: pwsh
      - name: Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: artifacts/**/*
